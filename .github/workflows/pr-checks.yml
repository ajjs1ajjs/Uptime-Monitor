name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install black==26.5.1 ruff==0.15.14 flake8==7.3.0 isort==8.0.1 mypy==2.1.0 bandit==1.9.4

      - name: Run Black
        run: black --check Uptime_Robot/ --diff

      - name: Run Ruff
        run: ruff check Uptime_Robot/

      - name: Run Flake8
        run: flake8 Uptime_Robot/ --max-line-length=100 --extend-ignore=E501,W503,E203

      - name: Run isort
        run: isort --check-only Uptime_Robot/ --diff

      - name: Run mypy
        run: mypy Uptime_Robot/ --ignore-missing-imports

      - name: Run bandit
        run: bandit -r Uptime_Robot/ -x Uptime_Robot/tests.py -ll

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          # SC1091: don't follow sourced files; SC2155: declare+assign style — non-critical
          find . -type f -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 -r shellcheck --severity=warning -e SC1091,SC2155 || true

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r Uptime_Robot/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=Uptime_Robot --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          flags: unittests
          name: codecov-umbrella

name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install black ruff flake8 isort mypy

      - name: Run Black
        run: black --check Uptime_Robot/ --diff

      - name: Run Ruff
        run: ruff check Uptime_Robot/

      - name: Run Flake8
        run: flake8 Uptime_Robot/ --max-line-length=100 --extend-ignore=E501,W503

      - name: Run isort
        run: isort --check-only Uptime_Robot/ --diff

      - name: Run mypy
        run: mypy Uptime_Robot/ --ignore-missing-imports

      - name: Run bandit
        run: bandit -r Uptime_Robot/ -x Uptime_Robot/tests.py -ll

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r Uptime_Robot/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=Uptime_Robot --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          flags: unittests
          name: codecov-umbrella

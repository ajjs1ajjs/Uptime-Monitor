{% extends "base.html" %}
{% block title %}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="glass rounded-2xl p-8 md:p-10 animate-fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto gradient-accent rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-cyan-500/30 mb-4">⚡</div>
                <h1 class="text-2xl font-bold" data-i18n="login_title">Uptime Monitor</h1>
                <p class="text-slate-400 text-sm mt-1" data-i18n="login_enterprise">Enterprise uptime monitoring</p>
            </div>

            {% if error_message %}
            <div class="mb-6 p-4 rounded-xl bg-status-down/10 border border-red-500/30 text-status-down text-sm">{{ error_message }}</div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm text-slate-400 mb-2 font-medium" data-i18n="users_username">Username</label>
                    <input type="text" id="username" name="username" required autofocus data-i18n="users_username"
                        class="w-full px-4 py-3 rounded-xl bg-[#0f172a] border border-slate-700/50 text-white placeholder-slate-500 focus:border-accent focus:ring-1 focus:ring-accent outline-none transition">
                </div>
                <div>
                    <label for="password" class="block text-sm text-slate-400 mb-2 font-medium" data-i18n="users_password">Password</label>
                    <input type="password" id="password" name="password" required data-i18n="users_password"
                            class="w-full px-4 py-3 rounded-xl bg-[#0f172a] border border-slate-700/50 text-white placeholder-slate-500 focus:border-accent focus:ring-1 focus:ring-accent outline-none transition">
                    </div>
                    <div class="text-xs text-slate-500 mt-1" data-i18n="password_requirements">
                        Password requirements: 12+ chars, uppercase + lowercase + digit
                    </div>
                <button type="submit" data-i18n="login_btn"
                    class="w-full py-3.5 rounded-xl gradient-accent text-black font-bold text-base hover:shadow-lg hover:shadow-cyan-500/30 transition-all duration-200 active:scale-[0.98]">
                    Увійти
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/forgot-password" class="text-accent text-sm hover:underline transition" data-i18n="login_forgot">Забули пароль?</a>
            </div>
        </div>
        <p class="text-center mt-6 text-slate-600 text-xs" data-i18n="login_version">Uptime Monitor v2.1.0</p>
    </div>
</div>
{% endblock %}

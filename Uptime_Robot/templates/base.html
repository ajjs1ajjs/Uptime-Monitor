<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Uptime Monitor{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#00d9ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Uptime Monitor">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        document.addEventListener('htmx:beforeSwap', function(evt) {
            if (evt.detail.xhr.status === 429) {
                alert('Rate limited. Please wait.');
                evt.detail.shouldSwap = false;
            }
        });
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: { DEFAULT: '#00d9ff', hover: '#00a8cc' },
                        'bg-primary': '#0f172a',
                        'bg-secondary': '#1e293b',
                        'bg-card': '#1e293b',
                        'border-dark': '#334155',
                    }
                }
            }
        }
    </script>
    <style>
        body { min-height: 100vh; }
        .status-up { color: #10b981; }
        .status-down { color: #ef4444; }
        .status-warning { color: #f59e0b; }
        .bg-status-up { background: rgba(16,185,129,0.15); }
        .bg-status-down { background: rgba(239,68,68,0.15); }
        .bg-status-warning { background: rgba(245,158,11,0.15); }
        .glass { background: rgba(30,41,59,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(148,163,184,0.1); }
        .card-hover:hover { border-color: rgba(0,217,255,0.3); box-shadow: 0 0 30px rgba(0,217,255,0.1); transform: translateY(-2px); }
        .animate-fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .gradient-accent { background: linear-gradient(135deg, #00d9ff, #06b6d4); }
        .gradient-card { background: linear-gradient(180deg, rgba(30,41,59,0.7), rgba(15,23,42,0.9)); }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-[#0f172a] via-[#1e293b] to-[#0f172a] text-white">
    {% block content %}{% endblock %}
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(function(err) {
                console.log('SW registration failed:', err);
            });
        }
    </script>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            const isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            if (!isDark) {
                document.body.className = 'bg-gradient-to-br from-slate-100 via-white to-slate-100 text-slate-900';
            }
            window.__isDark = isDark;
        })();

        function toggleTheme() {
            const isDark = !window.__isDark;
            window.__isDark = isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.documentElement.classList.toggle('dark', isDark);
            if (isDark) {
                document.body.className = 'bg-gradient-to-br from-[#0f172a] via-[#1e293b] to-[#0f172a] text-white';
            } else {
                document.body.className = 'bg-gradient-to-br from-slate-100 via-white to-slate-100 text-slate-900';
            }
            const btn = document.getElementById('themeBtn');
            if (btn) btn.textContent = isDark ? '🌙' : '☀️';
            const glass = document.querySelectorAll('.glass');
            glass.forEach(el => {
                if (isDark) {
                    el.style.background = 'rgba(30,41,59,0.6)';
                } else {
                    el.style.background = 'rgba(255,255,255,0.8)';
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('themeBtn');
            if (btn) btn.textContent = window.__isDark ? '🌙' : '☀️';
            const glass = document.querySelectorAll('.glass');
            if (!window.__isDark) {
                glass.forEach(el => el.style.background = 'rgba(255,255,255,0.8)');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

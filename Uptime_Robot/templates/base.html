<!DOCTYPE html>
<html lang="uk" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Uptime Monitor{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: { DEFAULT: '#00d9ff', hover: '#00a8cc' },
                        'bg-primary': '#0f172a',
                        'bg-secondary': '#1e293b',
                        'bg-card': '#1e293b',
                        'border-dark': '#334155',
                    }
                }
            }
        }
    </script>
    <style>
        body { min-height: 100vh; }
        .status-up { color: #10b981; }
        .status-down { color: #ef4444; }
        .status-warning { color: #f59e0b; }
        .bg-status-up { background: rgba(16,185,129,0.15); }
        .bg-status-down { background: rgba(239,68,68,0.15); }
        .bg-status-warning { background: rgba(245,158,11,0.15); }
        .glass { background: rgba(30,41,59,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(148,163,184,0.1); }
        .card-hover:hover { border-color: rgba(0,217,255,0.3); box-shadow: 0 0 30px rgba(0,217,255,0.1); transform: translateY(-2px); }
        .animate-fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .gradient-accent { background: linear-gradient(135deg, #00d9ff, #06b6d4); }
        .gradient-card { background: linear-gradient(180deg, rgba(30,41,59,0.7), rgba(15,23,42,0.9)); }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-[#0f172a] text-white">
    {% block content %}{% endblock %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.classList.toggle('dark', theme === 'dark');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

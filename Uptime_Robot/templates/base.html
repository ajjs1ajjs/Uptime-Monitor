    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#00d9ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Uptime Monitor">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        document.addEventListener('htmx:beforeSwap', function(evt) {
            if (evt.detail.xhr.status === 429) {
                alert('Rate limited. Please wait.');
                evt.detail.shouldSwap = false;
            }
        });
        document.addEventListener('htmx:afterSwap', function(evt) {
            if (typeof applyLanguage === 'function') {
                applyLanguage();
            }
        });
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: { DEFAULT: '#00d9ff', hover: '#00a8cc' },
                        'bg-primary': 'var(--bg-primary)',
                        'bg-secondary': 'var(--bg-secondary)',
                        'bg-card': 'var(--bg-card)',
                        'border-dark': 'var(--border-color)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: rgba(148,163,184,0.1);
            --glass-bg: rgba(30,41,59,0.6);
            --card-grad: linear-gradient(180deg, rgba(30,41,59,0.7), rgba(15,23,42,0.9));
            --body-grad: linear-gradient(to bottom right, #0f172a, #1e293b, #0f172a);
            --input-bg: #0f172a;
            --input-border: rgba(51,65,85,0.5);
        }
        .light {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: rgba(0,0,0,0.08);
            --glass-bg: rgba(255,255,255,0.85);
            --card-grad: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(248,250,252,0.95));
            --body-grad: linear-gradient(to bottom right, #f1f5f9, #f8fafc, #f1f5f9);
            --input-bg: #ffffff;
            --input-border: rgba(0,0,0,0.1);
        }
        body { min-height: 100vh; background: var(--body-grad); color: var(--text-primary); }
        .status-up { color: #10b981; }
        .status-down { color: #ef4444; }
        .status-warning { color: #f59e0b; }
        .bg-status-up { background: rgba(16,185,129,0.15); }
        .bg-status-down { background: rgba(239,68,68,0.15); }
        .bg-status-warning { background: rgba(245,158,11,0.15); }
        .glass { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--border-color); }
        .card-hover:hover { border-color: rgba(0,217,255,0.3); box-shadow: 0 0 30px rgba(0,217,255,0.1); transform: translateY(-2px); }
        .animate-fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .gradient-accent { background: linear-gradient(135deg, #00d9ff, #06b6d4); }
        .gradient-card { background: var(--card-grad); }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        input, select { background: var(--input-bg) !important; border-color: var(--input-border) !important; color: var(--text-primary) !important; }
        table { color: var(--text-primary); }
        .text-slate-400 { color: var(--text-secondary) !important; }
    </style>
    {% block head %}{% endblock %}
</head>

        function applyLanguage() {
            const lang = localStorage.getItem('lang') || 'uk';
            const dict = i18n[lang] || i18n.uk;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) {
                    if (el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'password' || el.type === 'url' || el.type === 'search')) {
                        el.placeholder = dict[key];
                    } else {
                        el.textContent = dict[key];
                    }
                }
            });
            
            const titleEl = document.querySelector('title');
            if (titleEl && dict['dashboard_title'] && window.location.pathname === '/') {
                titleEl.textContent = dict['dashboard_title'];
            }
            
            const langBtn = document.getElementById('langBtn');
            if (langBtn) {
                langBtn.textContent = lang === 'uk' ? '🇺🇦 UA' : '🇬🇧 EN';
            }
        }

        function toggleLang() {
            const current = localStorage.getItem('lang') || 'uk';
            const next = current === 'uk' ? 'en' : 'uk';
            localStorage.setItem('lang', next);
            applyLanguage();
            if (typeof renderMonitors === 'function') {
                renderMonitors();
            }
            if (typeof renderSSLCertificates === 'function') {
                renderSSLCertificates();
            }
            if (typeof renderUsers === 'function' && typeof lastUsersList !== 'undefined') {
                renderUsers(lastUsersList);
            }
        }

        (function() {
            const theme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = theme ? theme === 'dark' : prefersDark;
            window.__isDark = isDark;
            if (!isDark) {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
            }
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) themeBtn.textContent = isDark ? '🌙' : '☀️';
            applyLanguage();
        })();

        function toggleTheme() {
            const isDark = !window.__isDark;
            window.__isDark = isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
            } else {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
            }
            const btn = document.getElementById('themeBtn');
            if (btn) btn.textContent = isDark ? '🌙' : '☀️';
        }
